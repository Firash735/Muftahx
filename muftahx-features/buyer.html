<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Find Suppliers — MuftahX</title>
<style>
:root{--g:#1b4332;--gold:#c9952a;--navy:#0f2044;--bg:#0a1020;--surface:rgba(255,255,255,.05);--border:rgba(255,255,255,.09);--text:rgba(255,255,255,.85);--muted:rgba(255,255,255,.4);--mono:'Courier New',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh}
nav{background:var(--navy);border-bottom:1px solid rgba(201,149,42,.18);height:60px;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:Georgia,serif;font-size:20px;font-weight:700;color:#fff;text-decoration:none}
.logo span{color:var(--gold)}
.logo small{font-family:var(--mono);font-size:9px;color:var(--muted);margin-left:10px;letter-spacing:.1em}
.nav-tabs{display:flex;gap:6px}
.nav-tab{padding:7px 16px;font-size:11px;border:none;border-radius:6px;cursor:pointer;background:transparent;color:var(--muted);font-family:var(--mono);transition:all .15s}
.nav-tab.active{background:rgba(201,149,42,.15);color:var(--gold)}
.nav-back{padding:7px 16px;font-size:11px;color:var(--muted);text-decoration:none;border:1px solid var(--border);border-radius:6px}
main{max-width:1200px;margin:0 auto;padding:2rem}
.search-bar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.search-input{flex:1;min-width:220px;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-size:12px;outline:none;font-family:var(--mono);transition:border-color .15s}
.search-input:focus{border-color:rgba(201,149,42,.4)}
.cat-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.cat-btn{padding:6px 14px;border-radius:5px;font-size:11px;cursor:pointer;font-family:var(--mono);transition:all .15s;border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--muted)}
.cat-btn.active{background:var(--gold);color:var(--g);border-color:var(--gold)}
.count{font-size:11px;color:var(--muted);margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.25rem;transition:border-color .15s}
.card:hover{border-color:rgba(201,149,42,.2)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.card-title{font-size:13px;font-weight:600;line-height:1.4;flex:1}
.star-btn{background:none;border:none;cursor:pointer;font-size:16px;margin-left:8px;transition:color .15s;padding:0}
.seller-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.seller-name{font-size:11px;color:var(--muted)}
.verified-badge{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:700;background:rgba(116,198,157,.12);color:#74c69d;border:1px solid rgba(116,198,157,.25)}
.rating{font-size:10px;color:var(--gold);margin-left:auto}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
.meta-cell{background:rgba(255,255,255,.04);border-radius:6px;padding:7px 10px}
.meta-key{font-size:8px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px}
.meta-val{font-size:11px;color:var(--text)}
.desc{font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:12px}
.card-actions{display:flex;gap:8px}
.btn{padding:8px 0;border-radius:6px;font-size:11px;cursor:pointer;font-family:var(--mono);border:none;transition:all .15s;text-decoration:none;display:inline-block;text-align:center}
.btn-primary{flex:1;background:var(--gold);color:var(--g);font-weight:700}
.btn-primary:disabled{background:rgba(116,198,157,.1);color:#74c69d;cursor:default}
.btn-secondary{padding:8px 14px;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--muted)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:none;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:#0f1f3d;border:1px solid rgba(201,149,42,.25);border-radius:16px;padding:2rem;width:100%;max-width:520px}
.modal-title{font-size:15px;font-weight:600;margin-bottom:4px}
.modal-sub{font-size:11px;color:var(--muted);margin-bottom:20px}
.field{margin-bottom:14px}
label{display:block;font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
input,textarea{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px;padding:10px 12px;border-radius:7px;outline:none;transition:border-color .15s}
input:focus,textarea:focus{border-color:rgba(201,149,42,.4)}
textarea{resize:vertical;min-height:100px}
.modal-actions{display:flex;gap:10px}
.modal-submit{flex:1;padding:12px;background:var(--gold);color:var(--g);font-family:var(--mono);font-size:12px;font-weight:700;border:none;border-radius:7px;cursor:pointer}
.modal-cancel{padding:12px 20px;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--muted);border-radius:7px;font-family:var(--mono);font-size:12px;cursor:pointer}
.toast{position:fixed;top:16px;right:16px;z-index:9999;background:var(--g);border:1px solid #40916c;color:#fff;padding:10px 20px;border-radius:8px;font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.tab-content{display:none}
.tab-content.active{display:block}
.empty{text-align:center;padding:4rem;color:var(--muted);font-size:13px}
@media(max-width:700px){.meta-grid{grid-template-columns:1fr}.nav-tabs{display:none}}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- Inquiry Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">Send Inquiry</div>
    <div class="modal-sub" id="modal-sub">To: Seller Name · Product</div>
    <div class="field">
      <label>Quantity needed *</label>
      <input id="inq-qty" placeholder="e.g. 5 MT per week or 100,000 stems/month" />
    </div>
    <div class="field">
      <label>Destination country *</label>
      <input id="inq-dest" placeholder="e.g. Netherlands, Rotterdam port" />
    </div>
    <div class="field">
      <label>Your message *</label>
      <textarea id="inq-msg" placeholder="Introduce your company, specify quality requirements, payment terms preference, and when you need delivery..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="modal-submit" onclick="sendInquiry()">Send Inquiry →</button>
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<nav>
  <a class="logo" href="/index.html">Muftah<span>X</span><small>BUYER DASHBOARD</small></a>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showTab('search')">Find Suppliers</button>
    <button class="nav-tab" onclick="showTab('inquiries')" id="inq-tab">Inquiries (0)</button>
    <button class="nav-tab" onclick="showTab('saved')" id="saved-tab">Saved (0)</button>
  </div>
  <a class="nav-back" href="/index.html">← Marketplace</a>
</nav>

<main>
  <!-- SEARCH TAB -->
  <div class="tab-content active" id="tab-search">
    <div class="search-bar">
      <input class="search-input" id="search-input" placeholder="Search by product, origin, or seller..." oninput="renderCards()" />
    </div>
    <div class="cat-filters" id="cat-filters"></div>
    <div class="count" id="count">6 suppliers found</div>
    <div class="grid" id="cards-grid"></div>
  </div>

  <!-- INQUIRIES TAB -->
  <div class="tab-content" id="tab-inquiries">
    <div id="inquiries-list"></div>
  </div>

  <!-- SAVED TAB -->
  <div class="tab-content" id="tab-saved">
    <div id="saved-list"></div>
  </div>
</main>

<script>
var ALL = [
  { id:'1', title:'Premium Red Roses — Grade AA', cat:'Cut Flowers', price:'$0.28/stem', moq:'50,000 stems/week', origin:'Naivasha, Nakuru County', certs:'KEPHIS + GlobalGAP', desc:'Fresh cut roses, 60cm stems, 28-day vase life. Cold chain from farm to Nairobi Airport within 6 hours.', shipping:'FOB Nairobi Airport', seller:'Naivasha Rose Growers Ltd', verified:true, season:'Year-round', rating:4.9 },
  { id:'2', title:'Arabica Coffee — Washed AA Grade', cat:'Coffee', price:'$4.20/kg', moq:'1 MT per shipment', origin:'Nyeri, Central Kenya', certs:'KEPHIS + GlobalGAP + FDA', desc:'Single origin washed Arabica. Cupping score 88+. Direct from cooperative with full traceability.', shipping:'FOB Mombasa', seller:'Kenya AA Coffee Estates', verified:true, season:'Oct–Jan', rating:4.8 },
  { id:'3', title:'Hass Avocado — Export Grade A', cat:'Avocado & Fruits', price:'$0.45/kg', moq:'5 MT per container', origin:"Murang'a County", certs:'KEPHIS + GlobalGAP', desc:'Fresh Hass avocado, 180–300g fruit. Packaged in 4kg cartons. 21-day shelf life.', shipping:'CIF destination', seller:'Fresh Horticulture Kenya', verified:false, season:'Mar–Aug', rating:4.6 },
  { id:'4', title:'Black Tea — BOP Grade', cat:'Tea', price:'$2.80/kg', moq:'500kg per order', origin:'Kericho, Rift Valley', certs:'KEPHIS + AFA/HCD', desc:'Broken Orange Pekoe. Strong liquor, bright colour. Packaged in 40kg paper sacks.', shipping:'FOB Mombasa', seller:'Rift Valley Tea Producers', verified:true, season:'Year-round', rating:4.7 },
  { id:'5', title:'Macadamia Nuts — Style 0/1', cat:'Macadamia', price:'$7.50/kg', moq:'2 MT per shipment', origin:'Muranga / Kirinyaga', certs:'KEPHIS only', desc:'Whole kernel, moisture <1.5%. Natural and dry roasted available. Food safety certified facility.', shipping:'FOB Mombasa', seller:'Macadamia Africa Ltd', verified:false, season:'Jun–Oct', rating:4.4 },
  { id:'6', title:'French Beans — Extra Fine', cat:'Vegetables', price:'$1.20/kg', moq:'1 MT/week', origin:'Naivasha & Meru', certs:'KEPHIS + GlobalGAP + FDA', desc:'Extra fine beans, 6–9cm. Air-freighted fresh. 72-hour farm-to-market. BRC certified pack house.', shipping:'FOB Nairobi Airport', seller:'Fresh Horticulture Kenya', verified:false, season:'Year-round', rating:4.5 },
];

var CATS = ['All','Cut Flowers','Coffee','Tea','Avocado & Fruits','Vegetables','Macadamia'];
var activeCat = 'All';
var saved = [];
var sent = [];
var selectedId = null;

function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 3500);
}

function showTab(name) {
  document.querySelectorAll('.tab-content').forEach(function(el){ el.classList.remove('active'); });
  document.querySelectorAll('.nav-tab').forEach(function(el){ el.classList.remove('active'); });
  document.getElementById('tab-' + name).classList.add('active');
  var map = { search:0, inquiries:1, saved:2 };
  document.querySelectorAll('.nav-tab')[map[name]].classList.add('active');
  if (name === 'inquiries') renderInquiries();
  if (name === 'saved') renderSaved();
}

function renderCats() {
  document.getElementById('cat-filters').innerHTML = CATS.map(function(c) {
    return '<button class="cat-btn' + (activeCat===c?' active':'') + '" onclick="setCat(\'' + c.replace(/&/g,'&amp;') + '\')">' + c + '</button>';
  }).join('');
}

function setCat(c) { activeCat = c; renderCats(); renderCards(); }

function renderCards() {
  var q = document.getElementById('search-input').value.toLowerCase();
  var filtered = ALL.filter(function(l) {
    var matchCat = activeCat==='All' || l.cat===activeCat;
    var matchQ = !q || l.title.toLowerCase().includes(q) || l.origin.toLowerCase().includes(q) || l.seller.toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  document.getElementById('count').textContent = filtered.length + ' supplier' + (filtered.length!==1?'s':'') + ' found';
  document.getElementById('cards-grid').innerHTML = filtered.map(function(l) {
    var isSent = sent.includes(l.id);
    var isSaved = saved.includes(l.id);
    return '<div class="card">' +
      '<div class="card-top">' +
        '<div class="card-title">' + l.title + '</div>' +
        '<button class="star-btn" onclick="toggleSave(\'' + l.id + '\')" style="color:' + (isSaved?'var(--gold)':'rgba(255,255,255,.2)') + '">★</button>' +
      '</div>' +
      '<div class="seller-row">' +
        '<span class="seller-name">' + l.seller + '</span>' +
        (l.verified ? '<span class="verified-badge">✓ VERIFIED</span>' : '') +
        '<span class="rating">★ ' + l.rating + '</span>' +
      '</div>' +
      '<div class="meta-grid">' +
        '<div class="meta-cell"><div class="meta-key">Price</div><div class="meta-val">' + l.price + '</div></div>' +
        '<div class="meta-cell"><div class="meta-key">MOQ</div><div class="meta-val">' + l.moq + '</div></div>' +
        '<div class="meta-cell"><div class="meta-key">Origin</div><div class="meta-val">' + l.origin + '</div></div>' +
        '<div class="meta-cell"><div class="meta-key">Season</div><div class="meta-val">' + l.season + '</div></div>' +
      '</div>' +
      '<div class="desc">' + l.desc.substring(0,110) + '...</div>' +
      '<div class="card-actions">' +
        '<button class="btn btn-primary"' + (isSent?' disabled':'') + ' onclick="openModal(\'' + l.id + '\')">' + (isSent?'✓ Inquiry sent':'Send Inquiry →') + '</button>' +
        '<a href="/negotiate" class="btn btn-secondary">Negotiate</a>' +
      '</div>' +
    '</div>';
  }).join('');
}

function toggleSave(id) {
  var idx = saved.indexOf(id);
  if (idx>=0) { saved.splice(idx,1); toast('Removed from saved'); }
  else { saved.push(id); toast('✓ Saved to your list'); }
  document.getElementById('saved-tab').textContent = 'Saved (' + saved.length + ')';
  renderCards();
}

function openModal(id) {
  selectedId = id;
  var l = ALL.find(function(x){ return x.id===id; });
  document.getElementById('modal-sub').textContent = 'To: ' + l.seller + ' · ' + l.title;
  document.getElementById('inq-qty').value = '';
  document.getElementById('inq-dest').value = '';
  document.getElementById('inq-msg').value = '';
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  selectedId = null;
}

function sendInquiry() {
  var qty  = document.getElementById('inq-qty').value.trim();
  var dest = document.getElementById('inq-dest').value.trim();
  var msg  = document.getElementById('inq-msg').value.trim();
  if (!qty || !dest || !msg) { toast('⚠ Please fill in all fields'); return; }
  sent.push(selectedId);
  closeModal();
  document.getElementById('inq-tab').textContent = 'Inquiries (' + sent.length + ')';
  toast('✓ Inquiry sent! The seller will respond within 24 hours.');
  renderCards();
}

function renderInquiries() {
  if (sent.length === 0) {
    document.getElementById('inquiries-list').innerHTML = '<div class="empty">No inquiries sent yet.<br>Go to Find Suppliers and contact a seller.</div>';
    return;
  }
  document.getElementById('inquiries-list').innerHTML = ALL.filter(function(l){ return sent.includes(l.id); }).map(function(l) {
    return '<div class="card" style="margin-bottom:12px">' +
      '<div style="display:flex;justify-content:space-between;margin-bottom:8px">' +
        '<div style="font-size:13px;font-weight:600">' + l.title + '</div>' +
        '<span style="padding:3px 10px;border-radius:12px;font-size:9px;font-weight:700;background:rgba(201,149,42,.14);color:var(--gold)">AWAITING REPLY</span>' +
      '</div>' +
      '<div style="font-size:11px;color:var(--muted);margin-bottom:12px">Seller: ' + l.seller + ' · ' + l.origin + '</div>' +
      '<a href="/negotiate" style="padding:7px 16px;background:var(--gold);color:var(--g);border-radius:6px;font-size:11px;font-weight:700;text-decoration:none">Open Negotiation Room →</a>' +
    '</div>';
  }).join('');
}

function renderSaved() {
  if (saved.length === 0) {
    document.getElementById('saved-list').innerHTML = '<div class="empty">No saved listings yet.<br>Click ★ on any listing to save it.</div>';
    return;
  }
  document.getElementById('saved-list').innerHTML = '<div class="grid">' + ALL.filter(function(l){ return saved.includes(l.id); }).map(function(l) {
    return '<div class="card">' +
      '<div style="font-size:13px;font-weight:600;margin-bottom:6px">' + l.title + '</div>' +
      '<div style="font-size:11px;color:var(--muted);margin-bottom:10px">' + l.seller + ' · ' + l.price + '</div>' +
      '<button class="btn btn-primary" style="width:100%" onclick="openModal(\'' + l.id + '\')">Send Inquiry →</button>' +
    '</div>';
  }).join('') + '</div>';
}

document.getElementById('modal').addEventListener('click', function(e){ if(e.target===this) closeModal(); });
renderCats();
renderCards();
</script>
</body>
</html>
